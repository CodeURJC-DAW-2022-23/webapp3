<!DOCTYPE html>
<html lang="en" class="no-js">
    <head>
        <meta charset="UTF-8">
         <!-- Mobile specific meta-->
        <meta name=viewport content="width=device-width, initial-scale=1">
        <meta name="format-detection" content="telephone-no">

         <!--Google Font-->
         <link rel="stylesheet" href='http://fonts.googleapis.com/css?family=Dosis:400,700,500|Nunito:300,400,600' />
       
        <!-- CSS files -->
        <link rel="stylesheet" href="css/plugins.css">
        <link rel="stylesheet" href="css/style.css">
    </head>

    <body>

<!-- BEGIN | Header -->
{{>header}}
<!-- END | Header -->

<div class="page-single">
	<div class="container" style="margin-top: 120px;">
		<div class="row ipad-width">
			<div class="col-md-9 col-sm-12 col-xs-12">
				<div class="form-style-1 user-pro" action="#">
					<form th:action="@{/log_in}" th:object="${user}" method="post">
						<div class="row">
							<div class="col-md-6 form-it">
								<label>Username</label>
								<input type="text" name="username" th:field="$*{username}" placeholder="edwardkennedy">
							</div>
						</div>
						<div class="row">
							<div class="col-md-6 form-it">
								<label>Password</label>
								<input type="password" name="password" th:field="$*{password}" placeholder="***************">
							</div>
						</div>
						<div class="row">
							<div class="col-md-6 form-it">
								{{#log_in_error}}
								<div class="error-message" style="color: firebrick;">{{log_in_error}}</div>
								{{/log_in_error}}
							</div>
						</div>
						<div class="row">
							<div class="col-md-2">
								<input class="submit" type="submit" value="login">
							</div>
						</div>
						<div class="row">
							<div class="col-md-12">
								<p>Don't have an account? <a href="/sign_up">Sign up here</a></p>
							</div>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
</div>
<!-- footer section-->
{{>footer}}
<!-- end of footer section-->

<script src="js/jquery.js"></script>
<script src="js/plugins.js"></script>
<script src="js/plugins2.js"></script>
<script src="js/custom.js"></script>

</body>

</html>
